<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Compliance and Data Tracking System</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>body{font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}</style>
</head>
<body class="bg-slate-50 text-slate-900">
<div id="app"></div>
<script>
const students=[
{id:'stu-1',name:'Ari Johnson',program:'Elementary Education',stage:'Pre-Internship',site:'Glen Iris Elementary'},
{id:'stu-2',name:'Jordan Lee',program:'Collaborative Special Education K-6',stage:'Internship Ready',site:'Avondale Elementary'},
{id:'stu-3',name:'Samira Rahman',program:'P-12 ESL',stage:'Developing Practice',site:'Huffman High School'},
{id:'stu-4',name:'Miles Carter',program:'Secondary English',stage:'Pre-Internship',site:'Pending'}
];
let records={
'stu-1':{fieldForm:true,liability:true,background:true,fingerprint:true,suitability:true,canvas:false,hours:18,requiredHours:25,evaluation:false,placementConfirmed:true,notes:'Needs Canvas module completion and midterm evaluation.'},
'stu-2':{fieldForm:true,liability:true,background:true,fingerprint:true,suitability:true,canvas:true,hours:42,requiredHours:40,evaluation:true,placementConfirmed:true,notes:'Ready for internship review.'},
'stu-3':{fieldForm:true,liability:false,background:true,fingerprint:false,suitability:true,canvas:true,hours:12,requiredHours:20,evaluation:false,placementConfirmed:true,notes:'Missing liability and fingerprint verification.'},
'stu-4':{fieldForm:false,liability:false,background:false,fingerprint:false,suitability:false,canvas:false,hours:0,requiredHours:20,evaluation:false,placementConfirmed:false,notes:'Not ready for placement.'}
};
let selected='stu-1',tab='dashboard';
const reqs=[['fieldForm','Field Experience Form','Student / OCE'],['liability','Liability Insurance','Student / OCE'],['background','Background Clearance','External Verification'],['fingerprint','Fingerprint Verification','External Verification'],['suitability','Suitability Review','Faculty / OCE'],['canvas','Canvas Orientation','Institutional System'],['evaluation','Evaluation Submitted','Supervisor / OCE'],['placementConfirmed','Placement Confirmed','OCE']];
function status(r){let missing=reqs.filter(x=>!r[x[0]]).map(x=>x[1]);let hoursOk=r.hours>=r.requiredHours;if(!hoursOk)missing.push('Required Field Hours');if(missing.length===0)return{label:'Ready',tone:'green',missing};if(missing.length<=2)return{label:'At Risk',tone:'amber',missing};return{label:'Not Ready',tone:'red',missing};}
function badge(text,tone='green'){let c=tone==='red'?'bg-red-100 text-red-800':tone==='amber'?'bg-amber-100 text-amber-800':'bg-emerald-100 text-emerald-800';return `<span class="rounded-full px-3 py-1 text-xs font-semibold ${c}">${text}</span>`}
function card(title,icon,desc,body){return `<section class="rounded-3xl border border-slate-200 bg-white shadow-sm"><div class="border-b border-slate-100 p-5"><div class="flex items-center gap-2 text-lg font-semibold"><span class="grid h-6 w-6 place-items-center rounded-full bg-emerald-100 text-xs text-emerald-800">${icon}</span>${title}</div>${desc?`<p class="mt-1 text-sm text-slate-500">${desc}</p>`:''}</div><div class="p-5">${body}</div></section>`}
function checkbox(key,label){let r=records[selected];return `<label class="flex items-center justify-between rounded-xl border bg-white p-3 text-sm"><span>${label}</span><input data-check="${key}" type="checkbox" ${r[key]?'checked':''}></label>`}
function dashboard(){let rows=students.map(s=>{let r=records[s.id],st=status(r),pct=Math.min(100,Math.round((r.hours/r.requiredHours)*100));return `<tr class="border-b"><td class="py-3 font-medium">${s.name}</td><td class="py-3 text-sm text-slate-600">${s.program}</td><td class="py-3 text-sm text-slate-600">${s.site}</td><td class="py-3">${badge(st.label,st.tone)}</td><td class="py-3 text-sm">${r.hours}/${r.requiredHours}</td><td class="py-3 text-sm">${st.missing.length?st.missing.slice(0,3).join(', '):'None'}</td></tr>`}).join('');return `<div class="grid gap-6 lg:grid-cols-[1.2fr_.8fr]">${card('Compliance Overview','D','Real-time view of readiness, missing items, and risk.','<div class="overflow-auto"><table class="w-full text-left"><thead><tr class="border-b text-sm text-slate-500"><th class="py-2">Student</th><th>Program</th><th>Placement</th><th>Status</th><th>Hours</th><th>Missing</th></tr></thead><tbody>'+rows+'</tbody></table></div>')}${card('System Logic','S','How the tracker turns data into action.','<div class="space-y-3 text-sm"><div class="rounded-xl border p-3"><b>Input:</b> forms, Canvas completion, background/fingerprint status, evaluations, hours.</div><div class="rounded-xl border p-3"><b>Verification:</b> each item has a responsible source and reviewer.</div><div class="rounded-xl border p-3"><b>Output:</b> Ready, At Risk, or Not Ready with missing-item flags.</div><div class="rounded-xl border p-3"><b>Human control:</b> OCE can verify, correct, and document exceptions.</div></div>')}</div>`}
function studentView(){let s=students.find(x=>x.id===selected),r=records[selected],st=status(r);let reqHtml=reqs.map(([k,l])=>checkbox(k,l)).join('');return `<div class="grid gap-6 lg:grid-cols-[.9fr_1.1fr]">${card('Student Record','R','Select a student and update compliance checkpoints.',`<label class="block text-sm font-medium">Student<select id="studentSelect" class="mt-2 w-full rounded-xl border px-3 py-2 text-sm">${students.map(x=>`<option value="${x.id}" ${x.id===selected?'selected':''}>${x.name} — ${x.program}</option>`).join('')}</select></label><div class="mt-4 rounded-2xl border bg-slate-50 p-4"><b>${s.name}</b><p class="text-sm text-slate-500">${s.program} • ${s.stage}</p><p class="text-sm text-slate-500">Placement: ${s.site}</p><div class="mt-3">${badge(st.label,st.tone)}</div></div><label class="mt-4 block text-sm font-medium">Field Hours<input id="hours" type="number" class="mt-2 w-full rounded-xl border px-3 py-2 text-sm" value="${r.hours}"></label><label class="mt-4 block text-sm font-medium">Required Hours<input id="requiredHours" type="number" class="mt-2 w-full rounded-xl border px-3 py-2 text-sm" value="${r.requiredHours}"></label><label class="mt-4 block text-sm font-medium">Notes<textarea id="notes" class="mt-2 min-h-[90px] w-full rounded-xl border px-3 py-2 text-sm">${r.notes}</textarea></label><button id="saveRecord" class="mt-4 rounded-xl bg-emerald-700 px-4 py-2 text-sm font-medium text-white">Save record</button>`)}${card('Compliance Checklist','C','Each item is manually confirmable and tied to a source.',`<div class="space-y-2">${reqHtml}</div><div class="mt-4 rounded-2xl border bg-slate-50 p-4 text-sm"><b>Missing items:</b><p class="mt-1 text-slate-600">${st.missing.length?st.missing.join(', '):'None'}</p></div>`)}</div>`}
function sources(){return `<div class="grid gap-6 md:grid-cols-3">${card('Student / Candidate Inputs','1','Items students submit or complete.','<ul class="list-disc pl-5 text-sm space-y-2"><li>Field experience forms</li><li>Liability insurance</li><li>Student attestations</li><li>Required uploads</li></ul>')}${card('Institutional Systems','2','Items that may be imported or verified internally.','<ul class="list-disc pl-5 text-sm space-y-2"><li>Canvas orientation completion</li><li>Course enrollment</li><li>Program milestone status</li><li>Supervisor evaluations</li></ul>')}${card('External / Manual Verification','3','Items that require controlled confirmation.','<ul class="list-disc pl-5 text-sm space-y-2"><li>Background clearance</li><li>Fingerprint verification</li><li>Suitability review</li><li>Site-specific requirements</li></ul>')}</div>`}
function tests(){let all=students.map(s=>[s.name,status(records[s.id]).label]);let pass=[['Jordan ready',status(records['stu-2']).label==='Ready'],['Ari at risk',status(records['stu-1']).label==='At Risk'],['Miles not ready',status(records['stu-4']).label==='Not Ready'],['All records have required hours',students.every(s=>typeof records[s.id].requiredHours==='number')]];return card('Tracker Self-Tests','✓','Validation checks for core readiness logic.',pass.map(t=>`<div class="mb-3 flex justify-between rounded-2xl border bg-white p-4"><span>${t[0]}</span>${badge(t[1]?'Passed':'Failed',t[1]?'green':'red')}</div>`).join('')+'<pre class="mt-4 rounded-2xl bg-slate-950 p-4 text-sm text-slate-100">'+JSON.stringify(all,null,2)+'</pre>')}
function render(){let r=records[selected],st=status(r);let body=tab==='dashboard'?dashboard():tab==='record'?studentView():tab==='sources'?sources():tests();document.getElementById('app').innerHTML=`<main class="mx-auto max-w-7xl space-y-6 p-6 md:p-8"><section class="rounded-3xl bg-gradient-to-r from-emerald-900 via-emerald-800 to-green-700 p-8 text-white shadow-lg"><p class="text-sm uppercase tracking-[0.18em] text-emerald-100">Interview Demo Model</p><h1 class="mt-2 text-3xl font-semibold md:text-4xl">Compliance and Data Tracking System</h1><p class="mt-3 max-w-4xl text-sm text-emerald-50/95 md:text-base">A centralized tracker for eligibility, documentation, field hours, verification sources, risk flags, and early intervention.</p></section><section class="grid gap-4 md:grid-cols-4"><div class="rounded-2xl border bg-white p-5 shadow-sm"><p class="text-sm text-slate-500">Students</p><p class="text-3xl font-semibold">${students.length}</p></div><div class="rounded-2xl border bg-white p-5 shadow-sm"><p class="text-sm text-slate-500">Ready</p><p class="text-3xl font-semibold">${students.filter(s=>status(records[s.id]).label==='Ready').length}</p></div><div class="rounded-2xl border bg-white p-5 shadow-sm"><p class="text-sm text-slate-500">At Risk</p><p class="text-3xl font-semibold">${students.filter(s=>status(records[s.id]).label==='At Risk').length}</p></div><div class="rounded-2xl border bg-white p-5 shadow-sm"><p class="text-sm text-slate-500">Not Ready</p><p class="text-3xl font-semibold">${students.filter(s=>status(records[s.id]).label==='Not Ready').length}</p></div></section><nav class="flex flex-wrap gap-2 rounded-2xl bg-white p-2 shadow-sm">${['dashboard','record','sources','tests'].map(t=>`<button data-tab="${t}" class="rounded-xl px-4 py-2 text-sm font-medium capitalize ${tab===t?'bg-emerald-700 text-white':'text-slate-700 hover:bg-slate-100'}">${t}</button>`).join('')}</nav>${body}</main>`;bind()}
function bind(){document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{tab=b.dataset.tab;render()});let ss=document.getElementById('studentSelect');if(ss)ss.onchange=e=>{selected=e.target.value;render()};document.querySelectorAll('[data-check]').forEach(c=>c.onchange=e=>{records[selected][e.target.dataset.check]=e.target.checked;render()});let save=document.getElementById('saveRecord');if(save)save.onclick=()=>{records[selected].hours=Number(document.getElementById('hours').value)||0;records[selected].requiredHours=Number(document.getElementById('requiredHours').value)||0;records[selected].notes=document.getElementById('notes').value;render()}}
render();
</script>
</body>
</html>
